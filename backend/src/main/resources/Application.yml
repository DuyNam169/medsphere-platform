spring:
  application:
    name: medsphere-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medsphere}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:must-be-overridden-in-env-minimum-32-chars!!}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}       # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.medsphere: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN